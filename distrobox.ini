[devcon]
image=ghcr.io/itsachance/dev-container:v0
pull=true
start_now=true
init=false
nvidia=false
root=false
# Pin by digest instead of tag once v1 is cut, for strict reproducibility:
# image=ghcr.io/itsachance/dev-container@sha256:REPLACE-WITH-DIGEST

# Host $HOME is mounted by default — dotfiles come along for free.
# Uncomment to expose extra host paths under a stable name:
# volume="/mnt/data:/mnt/data"

# One-time setup on container creation. No-op by default.
# init_hooks="echo 'dev container ready'"
